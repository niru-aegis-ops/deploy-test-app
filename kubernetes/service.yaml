apiVersion: v1
kind: Service
metadata:
  name: test-app-new-service
  labels:
    app: test-app-new
spec:
  selector:
    app: test-app-new
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer # Use ClusterIP for internal access, NodePort or LoadBalancer for external
