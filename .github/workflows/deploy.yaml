name: Deploy test-app-new to Kubernetes

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: test-app-new

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push Docker images to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-kubernetes:
    runs-on: ubuntu-latest
    needs: build-and-push-image
    environment: production # Optional: for environment protection and secrets
    permissions:
      contents: read
      packages: read # Required to pull Docker images from GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig (Example - **Requires K8s context setup**)
        # This step is a placeholder. In a real scenario, you would use an action
        # to authenticate with your Kubernetes cluster (e.g., GKE, AKS, EKS).
        # Examples:
        # - uses: google-github-actions/get-gke-credentials@v1
        #   with:
        #     cluster_name: my-gke-cluster
        #     project_id: my-gcp-project
        #     location: us-central1
        #     credentials: ${{ secrets.GCP_CREDENTIALS }}
        # - uses: azure/k8s-set-context@v1
        #   with:
        #     kubeconfig: ${{ secrets.KUBE_CONFIG }}
        #     context: my-aks-cluster
        # - uses: aws-actions/configure-aws-credentials@v1
        #   with:
        #     role-to-assume: arn:aws:iam::123456789012:role/eks-github-actions
        #     aws-region: us-east-1
        # - uses: azure/setup-kubectl@v3 # Install kubectl if not present
        #   with:
        #     version: 'latest'
        run: |
          echo "--- Placeholder for Kubernetes cluster authentication ---"
          echo "Ensure 'kubectl' is installed and configured to connect to your cluster."
          echo "For testing, you might use a local K8s (minikube/kind) or a cloud provider's action."
          # Example for local testing (install kubectl and mock config if needed)
          # curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          # chmod +x kubectl
          # sudo mv kubectl /usr/local/bin/
          # echo "KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          # chmod 600 ~/.kube/config

      - name: Update Kubernetes deployment image
        run: |
          # Replace the image tag in the deployment manifest with the newly built image SHA
          # Note: This assumes the image name in deployment.yaml matches `ghcr.io/<YOUR_GITHUB_USERNAME>/test-app-new:latest`
          sed -i "s|ghcr.io/<YOUR_GITHUB_USERNAME>/${{ env.IMAGE_NAME }}:latest|ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" kubernetes/deployment.yaml

      - name: Apply Kubernetes manifests
        # This step requires kubectl to be configured to interact with your cluster.
        # If running in a CI/CD pipeline, ensure the runner has appropriate access.
        run: |
          echo "Applying Kubernetes deployment and service..."
          kubectl apply -f kubernetes/
          echo "Deployment applied successfully (assuming kubectl is configured)."
